name: "HA Solar Excess Optimizer"
description: "Modular PV surplus control – wallbox, boiler, smart plugs & more"
version: "0.1.6"
slug: "ha_solar_excess_optimizer"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
homeassistant_api: true

options:
  grid_power_entity: "sensor.grid_power"
  update_interval_sec: 10
  hysteresis_w: 150
  log_level: "info"
  on_delay_sec: 30
  off_delay_sec: 20
  sensor_stabilize_sec: 60

schema:
  grid_power_entity: str
  update_interval_sec: int
  hysteresis_w: int
  log_level: list(debug|info|warning|error)
  on_delay_sec: int?
  off_delay_sec: int?
  sensor_stabilize_sec: int?

ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "HA Solar Excess Optimizer Web UI"
map:
  - config:rw
  - share:rw
