<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #080f1a;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    #error {
      display: none;
      color: #ff4d6a;
      font-family: monospace;
      padding: 2rem;
      background: #080f1a;
    }
  </style>
</head>
<body>
  <div id="error"></div>
  <iframe id="frame" src="" allowfullscreen></iframe>
  <script>
    // Hostname aus HA holen, Port 8099 anhängen
    const host = window.location.hostname;
    const url = `http://${host}:8099`;
    const frame = document.getElementById('frame');
    frame.src = url;
    frame.onerror = () => {
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent =
        `⚠ Add-on nicht erreichbar unter ${url} – läuft das Add-on?`;
      frame.style.display = 'none';
    };
  </script>
</body>
</html>
